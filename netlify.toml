# Netlify deployment configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Run from repo root
  command   = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run build"
  publish   = "dist/public"

[build.environment]
  # Point the frontend at the Render backend.
  # Override this with your real Render URL in the Netlify dashboard:
  #   Site settings → Environment variables → VITE_API_URL
  VITE_API_URL = ""   # leave blank when frontend and backend share the same origin

# ─── SPA fallback ─────────────────────────────────────────────────────────────
# Every non-asset URL is served the index.html so wouter handles routing.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── API proxy (optional – only needed when deploying frontend-only to Netlify)
# If you want all /api/* requests to go to your Render backend at build time,
# add your Render URL below and uncomment:
#
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://your-app.onrender.com/api/:splat"
#   status = 200
#   force  = true
#
# Then set VITE_API_URL = "" (empty) in the Netlify dashboard.
