# Netlify deployment configuration

[build]
  command = "npm install && npm run build"
  publish = "dist/public"

[build.environment]
  NPM_FLAGS    = "--legacy-peer-deps"
  NODE_VERSION = "20"
  # VITE_API_URL is intentionally empty — the /api/* redirect below handles routing.
  # Only set VITE_API_URL in the Netlify dashboard if you need to override the proxy.
  VITE_API_URL = ""

# ─── API proxy → Render backend ───────────────────────────────────────────────
# IMPORTANT: Replace YOUR_RENDER_URL below with your actual Render service URL,
# e.g. https://ai-gateway-api.onrender.com
# This must be set before deploying — it cannot be injected at runtime.
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_RENDER_URL.onrender.com/api/:splat"
  status = 200
  force  = true

# ─── SPA fallback (must come AFTER the /api redirect) ─────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
