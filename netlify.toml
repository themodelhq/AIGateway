# Netlify deployment configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm install && npm run build"
  publish = "dist/public"

[build.environment]
  # Force Netlify to use npm instead of Yarn/pnpm
  NPM_FLAGS        = "--legacy-peer-deps"
  NODE_VERSION     = "20"
  # Point the frontend at the Render backend.
  # Set this in the Netlify dashboard: Site settings → Environment variables
  VITE_API_URL     = ""

# ─── SPA fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── API proxy (fill in your Render URL and uncomment) ────────────────────────
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://your-app.onrender.com/api/:splat"
#   status = 200
#   force  = true
