# Netlify deployment configuration

[build]
  command = "npm install && npm run build"
  publish = "dist/public"

[build.environment]
  NPM_FLAGS    = "--legacy-peer-deps"
  NODE_VERSION = "20"

# ─── API proxy → Render backend ───────────────────────────────────────────────
[[redirects]]
  from   = "/api/*"
  to     = "https://aigateway.onrender.com/api/:splat"
  status = 200
  force  = true

# ─── Gateway proxy → Render backend ──────────────────────────────────────────
[[redirects]]
  from   = "/v1/*"
  to     = "https://aigateway.onrender.com/v1/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "https://aigateway.onrender.com/health"
  status = 200
  force  = true

# ─── SPA fallback (must come AFTER the /api redirect) ─────────────────────────
# All routes are handled by the React app (wouter routing).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
