# Render deployment configuration
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: ai-gateway-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/trpc/system.health
    # Persist the SQLite database file across deploys
    disk:
      name: app-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/data/app.db
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ID
        value: ai-gateway
      - key: ADMIN_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
